<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<title>ویزیت آنلاین</title>
</head>
<body style="font-family:tahoma;text-align:center;margin-top:50px;">

<h2>ویزیت آنلاین</h2>

<input id="name" placeholder="نام"><br><br>
<input id="phone" placeholder="شماره"><br><br>
<textarea id="msg" placeholder="پیام"></textarea><br><br>

<button onclick="send()">ارسال</button>

<script>
async function send(){
  await fetch('/.netlify/functions/sendToTelegram',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      name: document.getElementById('name').value,
      phone: document.getElementById('phone').value,
      message: document.getElementById('msg').value
    })
  });

  alert('ارسال شد');
}
</script>

</body>
</html>
